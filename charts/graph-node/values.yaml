# Default values for graph-node.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: graphprotocol/graph-node
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  postgres:
    host: postgres
    user: username
    pass: password
    db: graph-node
    port: 5432
    # Extra connection args appended to the PostgreSQL connection URL
    # (exposed as $postgres_args for use in graph-node.toml).
    args: ""
    # if DB credentials are stored in existing secret
    existingSecret:
    existingSecretUsernameKey:
    existingSecretPasswordKey:
  ipfs: 'ipfs:5001'
  file: |
    [deployment]
    [[deployment.rule]]
    indexers = [ "default" ]
    shards   = [ "primary" ]
    [chains]
    ingestor = "block_ingestor"
    [chains.sepolia]
    shard    = "primary"
    provider = [{ label = "sepolia-main", url = "https://eth-sepolia.node.localhost", features = []}]
    [store]
    [store.primary]
    connection = "postgresql://${postgres_user}:${postgres_pass}@${postgres_host}/${postgres_db}"
    weight = 1
    pool_size = 10

env:
  GRAPH_LOG: info
  GRAPH_ETHEREUM_CLEANUP_BLOCKS: 'true'

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 256Mi

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# CronJob that periodically detects subgraphs that are synced=true but far
# behind chain head and restarts them via graphman. graphman talks to
# PostgreSQL directly using the same graph-node.toml / postgres_* env vars as
# the main deployment, so the job runs in a separate pod using the same image.
restartStuckSubgraphs:
  enabled: false
  schedule: "0 0 * * *"
  # Minimum "blocks behind" to consider a synced subgraph stuck.
  threshold: 1000
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # startingDeadlineSeconds: 300
  # backoffLimit: 0
  restartPolicy: OnFailure
  # Override image if you want to pin graphman to a specific graph-node
  # release. Defaults to the main .Values.image.
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Extra env vars (merged after .Values.env). Useful e.g. for GRAPH_LOG.
  extraEnv: {}
  # Script executed by the CronJob. Mounted from a ConfigMap at
  # /scripts/restart_subgraph.sh. Override to customize behavior.
  script: |
    #!/bin/bash
    set -euo pipefail
    PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    if [ -f /app/.env ]; then
      set -a
      . /app/.env
      set +a
    fi

    CONFIG="/app/config/graph-node.toml"
    THRESHOLD=1000
    AUTO_YES=0

    while [ $# -gt 0 ]; do
      case "$1" in
        -y|--yes)
          AUTO_YES=1
          shift
          ;;
        -t|--threshold)
          THRESHOLD="$2"
          shift 2
          ;;
        *)
          echo "Usage: $0 [-y|--yes] [-t|--threshold N]"
          exit 1
          ;;
      esac
    done

    tmpfile="$(mktemp)"
    trap 'rm -f "$tmpfile"' EXIT

    graphman -c "$CONFIG" info -s --all | awk -F'|' -v threshold="$THRESHOLD" '
    function trim(x) {
      gsub(/^[ \t]+|[ \t]+$/, "", x)
      return x
    }
    function flush() {
      if (namespace != "" && synced && behind > threshold) {
        printf "%s|%s|%s|%s\n", namespace, version, chain, behind
      }
    }
    $1 ~ /Namespace/ {
      flush()
      namespace = trim($2)
      sub(/ \[primary\]$/, "", namespace)
      version = ""
      chain = ""
      behind = 0
      synced = 0
    }
    $1 ~ /Version/ {
      version = trim($2)
      sub(/ \(current\)$/, "", version)
    }
    $1 ~ /Chain$/ { chain = trim($2) }
    $1 ~ /Synced/ { synced = ($2 ~ /true/) }
    $1 ~ /Blocks behind/ { behind = $2 + 0 }
    END { flush() }
    ' > "$tmpfile"

    if [ ! -s "$tmpfile" ]; then
      echo "No stuck subgraphs found (threshold: $THRESHOLD blocks)."
      exit 0
    fi

    echo "Stuck subgraphs (threshold: $THRESHOLD blocks):"
    echo
    awk -F'|' '{ printf "  - %-8s | %-35s | %-20s | behind=%s\n", $1, $2, $3, $4 }' "$tmpfile"
    echo
    count="$(wc -l < "$tmpfile" | tr -d " ")"
    echo "Total: $count"

    if [ "$AUTO_YES" -ne 1 ]; then
      printf "Restart these subgraphs? [y/N]: "
      read -r answer
      case "$answer" in
        y|Y) ;;
        *) echo "Aborted."; exit 0 ;;
      esac
    fi

    echo
    echo "Restarting..."
    while IFS='|' read -r namespace version chain behind; do
      echo "Restarting $namespace ($version, chain=$chain, behind=$behind)"
      rc=0
      graphman -c "$CONFIG" restart "$namespace" || rc=$?
      if [ "$rc" -eq 0 ]; then
        echo "OK: $namespace"
      else
        echo "FAILED: $namespace (exit=$rc)"
      fi
      echo
    done < "$tmpfile"
