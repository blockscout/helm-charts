name: Sync env var schema

on:
  repository_dispatch:
    types:
      - frontend-release
  workflow_dispatch:
    inputs:
      frontend-tag:
        description: "Frontend version tag (e.g. v1.38.0)"
        required: true
        type: string

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r charts/blockscout-stack/scripts/requirements.txt

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.frontend_tag }}"
          else
            TAG="${{ inputs.frontend-tag }}"
          fi
          echo "frontend-tag=$TAG" >> $GITHUB_OUTPUT

      - name: Sync env schema
        run: |
          python charts/blockscout-stack/scripts/sync-env-schema.py \
            --schema-path charts/blockscout-stack/values.schema.json \
            --registry-dir charts/blockscout-stack/scripts/env-registry \
            --frontend-tag "${{ steps.ver.outputs.frontend-tag }}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet charts/blockscout-stack/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sync-env-schema
          delete-branch: true
          title: "[blockscout-stack] Update frontend env schema (${{ steps.ver.outputs.frontend-tag }})"
          body: |
            Automated env var schema update from frontend `${{ steps.ver.outputs.frontend-tag }}`.

            Please review changes to:
            - `charts/blockscout-stack/values.schema.json` — updated env var properties
            - `charts/blockscout-stack/scripts/env-registry/frontend-envs.json` — updated registry cache
          labels: |
            automated
            schema-update
          reviewers: aagaev

  validate:
    needs: sync-schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: auto/sync-env-schema

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint charts/blockscout-stack/

      - name: Template chart
        run: helm template test charts/blockscout-stack/
